{% extends "base.html" %}
{% block title %}Смета готова · VILINS Smeta{% endblock %}

{% block content %}
<section class="editorial" style="text-align: center; max-width: var(--content-narrow); padding-top: var(--space-24);">
  <p class="eyebrow mb-3">Смета {{ inv.invoice_number }}</p>

  <div class="entrance-display mb-12">
    <h1 class="display display-5xl">Готово.</h1>
    <h1 class="display display-5xl muted">PDF создан, прецедент пополнил базу.</h1>
  </div>

  <p class="display display-3xl mono mb-12" style="font-family: var(--font-display); font-variant-numeric: tabular-nums;">
    {{ inv.total_amount | money }}
  </p>

  <div class="flex justify-center gap-3 flex-wrap">
    <a href="/estimates/{{ inv.id }}/pdf" target="_blank" rel="noopener" class="btn btn-secondary btn-lg">Открыть PDF</a>
    <a href="/estimates/{{ inv.id }}/pdf?download=1" class="btn btn-primary btn-lg">Скачать</a>
  </div>

  <p class="mt-12">
    <a href="/estimates" class="btn-link">← К списку смет</a>
    <span class="muted" style="margin-inline: 8px;">·</span>
    <a href="/estimates/new" class="btn-link">Создать новую</a>
  </p>
</section>
{% endblock %}
